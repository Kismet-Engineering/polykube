apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: polykube-operator
  labels:
    app.kubernetes.io/name: polykube-operator
    app.kubernetes.io/part-of: polykube
    app.kubernetes.io/managed-by: gitops
rules:
  - apiGroups:
      - infrastructure.polykube.dev
    resources:
      - clustermembers
      - federations
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - infrastructure.polykube.dev
    resources:
      - clustermembers/status
      - federations/status
    verbs:
      - update
