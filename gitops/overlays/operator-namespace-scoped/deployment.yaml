apiVersion: apps/v1
kind: Deployment
metadata:
  name: polykube-operator
  namespace: polykube-system
spec:
  template:
    spec:
      containers:
        - name: manager
          args:
            - --leader-elect
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --watch-namespace=polykube-workloads
