apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: polykube-operator-workloads
  namespace: polykube-workloads
  labels:
    app.kubernetes.io/name: polykube-operator
    app.kubernetes.io/part-of: polykube
    app.kubernetes.io/managed-by: gitops
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - get
      - list
      - update
      - watch
  - apiGroups:
      - runtime.polykube.dev
    resources:
      - workloads
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - runtime.polykube.dev
    resources:
      - workloads/status
    verbs:
      - update
  - apiGroups:
      - routing.polykube.dev
    resources:
      - serviceendpoints
    verbs:
      - get
      - list
      - update
      - watch
  - apiGroups:
      - routing.polykube.dev
    resources:
      - serviceendpoints/status
    verbs:
      - update
  - apiGroups:
      - data.polykube.dev
    resources:
      - datastorebindings
    verbs:
      - get
      - list
      - update
      - watch
  - apiGroups:
      - data.polykube.dev
    resources:
      - datastorebindings/status
    verbs:
      - update
