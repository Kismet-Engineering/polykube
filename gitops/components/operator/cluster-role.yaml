apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: polykube-operator
  labels:
    app.kubernetes.io/name: polykube-operator
    app.kubernetes.io/part-of: polykube
    app.kubernetes.io/managed-by: gitops
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - list
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - infrastructure.polykube.dev
    resources:
      - clustermembers
      - federations
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - infrastructure.polykube.dev
    resources:
      - clustermembers/status
      - federations/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - runtime.polykube.dev
    resources:
      - workloads
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - runtime.polykube.dev
    resources:
      - workloads/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - routing.polykube.dev
    resources:
      - serviceendpoints
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - routing.polykube.dev
    resources:
      - serviceendpoints/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - data.polykube.dev
    resources:
      - datastorebindings
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - data.polykube.dev
    resources:
      - datastorebindings/status
    verbs:
      - get
      - patch
      - update
