apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: polykube-operator
  labels:
    app.kubernetes.io/name: polykube-operator
    app.kubernetes.io/part-of: polykube
    app.kubernetes.io/managed-by: gitops
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - runtime.polykube.dev
    resources:
      - workloads
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - runtime.polykube.dev
    resources:
      - workloads/status
    verbs:
      - get
      - patch
      - update
