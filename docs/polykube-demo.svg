<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 278" role="img"
  aria-label="Polykube architecture: a GitOps repository delivers Workload manifests to Cluster A on AWS and Cluster B on GCP. The Polykube operator in each cluster reconciles local workloads. Cilium ClusterMesh connects the clusters for cross-cloud pod routing.">
  <title>Polykube — multicluster operator</title>
  <defs>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="760" height="278" rx="12" fill="#0d1117"/>

  <!-- ── GitOps box ── -->
  <rect x="295" y="18" width="170" height="58" rx="8"
    fill="#1c2433" stroke="#388bfd" stroke-width="1.5"/>
  <text x="380" y="41" text-anchor="middle"
    fill="#79b8ff" font-size="10" class="mono">source of truth</text>
  <text x="380" y="62" text-anchor="middle"
    fill="#f0f6fc" font-size="13" font-weight="600">GitOps · Workload.yaml</text>

  <!-- ── Flow lines: GitOps → clusters ── -->
  <path d="M 338 76 Q 210 106 192 138"
    fill="none" stroke="#21262d" stroke-width="1.5" stroke-dasharray="5 4"/>
  <path d="M 422 76 Q 550 106 568 138"
    fill="none" stroke="#21262d" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Flux label -->
  <text x="380" y="90" text-anchor="middle" fill="#3d444d" font-size="10">Flux reconciles to each cluster</text>

  <!-- Delivery packets → Cluster A (two staggered particles) -->
  <circle r="4" fill="#388bfd">
    <animateMotion dur="2.8s" begin="0s" repeatCount="indefinite"
      path="M 338 76 Q 210 106 192 138"/>
    <animate attributeName="opacity"
      values="0;1;1;0" keyTimes="0;0.06;0.88;1"
      dur="2.8s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#388bfd">
    <animateMotion dur="2.8s" begin="1.4s" repeatCount="indefinite"
      path="M 338 76 Q 210 106 192 138"/>
    <animate attributeName="opacity"
      values="0;1;1;0" keyTimes="0;0.06;0.88;1"
      dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Delivery packets → Cluster B (two staggered particles) -->
  <circle r="4" fill="#388bfd">
    <animateMotion dur="2.8s" begin="0.4s" repeatCount="indefinite"
      path="M 422 76 Q 550 106 568 138"/>
    <animate attributeName="opacity"
      values="0;1;1;0" keyTimes="0;0.06;0.88;1"
      dur="2.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#388bfd">
    <animateMotion dur="2.8s" begin="1.8s" repeatCount="indefinite"
      path="M 422 76 Q 550 106 568 138"/>
    <animate attributeName="opacity"
      values="0;1;1;0" keyTimes="0;0.06;0.88;1"
      dur="2.8s" begin="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Cluster A ── -->
  <rect x="55" y="138" width="274" height="136" rx="8"
    fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="192" y="163" text-anchor="middle"
    fill="#f0f6fc" font-size="13" font-weight="600">Cluster A</text>
  <text x="192" y="180" text-anchor="middle"
    fill="#8b949e" font-size="11">AWS · us-east-1</text>
  <!-- operator indicator -->
  <circle cx="75" cy="203" r="4" fill="#388bfd"/>
  <text x="86" y="207" fill="#58a6ff" font-size="10" class="mono">polykube-operator</text>
  <!-- pods -->
  <circle cx="90" cy="240" r="8" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.5;1" dur="3.4s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="116" cy="240" r="8" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.5;1" dur="3.4s" begin="0.55s" repeatCount="indefinite"/>
  </circle>
  <circle cx="142" cy="240" r="8" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.5;1" dur="3.4s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <text x="162" y="244" fill="#8b949e" font-size="11">pods · healthy</text>

  <!-- ── Cluster B ── -->
  <rect x="431" y="138" width="274" height="136" rx="8"
    fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="568" y="163" text-anchor="middle"
    fill="#f0f6fc" font-size="13" font-weight="600">Cluster B</text>
  <text x="568" y="180" text-anchor="middle"
    fill="#8b949e" font-size="11">GCP · us-central1</text>
  <!-- operator indicator -->
  <circle cx="451" cy="203" r="4" fill="#388bfd"/>
  <text x="462" y="207" fill="#58a6ff" font-size="10" class="mono">polykube-operator</text>
  <!-- pods -->
  <circle cx="466" cy="240" r="8" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.5;1" dur="3.4s" begin="0.25s" repeatCount="indefinite"/>
  </circle>
  <circle cx="492" cy="240" r="8" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.5;1" dur="3.4s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="518" cy="240" r="8" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.5;1" dur="3.4s" begin="1.35s" repeatCount="indefinite"/>
  </circle>
  <text x="538" y="244" fill="#8b949e" font-size="11">pods · healthy</text>

  <!-- ── Cilium ClusterMesh connector ── -->
  <line x1="329" y1="198" x2="431" y2="198"
    stroke="#388bfd" stroke-width="1" stroke-dasharray="4 3" opacity="0.45"/>

  <!-- Traffic L→R (blue) -->
  <circle r="3.5" fill="#58a6ff">
    <animateMotion dur="1.4s" begin="0s" repeatCount="indefinite"
      path="M 329 198 L 431 198"/>
    <animate attributeName="opacity"
      values="0;0.9;0.9;0" keyTimes="0;0.08;0.9;1"
      dur="1.4s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#58a6ff">
    <animateMotion dur="1.4s" begin="0.7s" repeatCount="indefinite"
      path="M 329 198 L 431 198"/>
    <animate attributeName="opacity"
      values="0;0.9;0.9;0" keyTimes="0;0.08;0.9;1"
      dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
  </circle>

  <!-- Traffic R→L (green, return path) -->
  <circle r="3.5" fill="#3fb950">
    <animateMotion dur="1.4s" begin="0.35s" repeatCount="indefinite"
      path="M 431 198 L 329 198"/>
    <animate attributeName="opacity"
      values="0;0.9;0.9;0" keyTimes="0;0.08;0.9;1"
      dur="1.4s" begin="0.35s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#3fb950">
    <animateMotion dur="1.4s" begin="1.05s" repeatCount="indefinite"
      path="M 431 198 L 329 198"/>
    <animate attributeName="opacity"
      values="0;0.9;0.9;0" keyTimes="0;0.08;0.9;1"
      dur="1.4s" begin="1.05s" repeatCount="indefinite"/>
  </circle>

  <text x="380" y="218" text-anchor="middle"
    fill="#484f58" font-size="10">Cilium ClusterMesh</text>


</svg>
