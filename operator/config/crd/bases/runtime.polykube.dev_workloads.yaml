apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workloads.runtime.polykube.dev
spec:
  group: runtime.polykube.dev
  scope: Namespaced
  names:
    plural: workloads
    singular: workload
    kind: Workload
    listKind: WorkloadList
    shortNames:
      - pwl
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - federationRef
                - image
              properties:
                federationRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                image:
                  type: string
                imagePullSecrets:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                ports:
                  type: array
                  items:
                    type: object
                    required:
                      - containerPort
                    properties:
                      name:
                        type: string
                      containerPort:
                        type: integer
                        format: int32
                        minimum: 1
                        maximum: 65535
                      protocol:
                        type: string
                env:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                envFrom:
                  type: array
                  items:
                    type: object
                    properties:
                      configMapRef:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                      secretRef:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                targetPolicy:
                  type: object
                  properties:
                    memberSelector:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    members:
                      type: array
                      items:
                        type: string
                    strategy:
                      type: string
                rolloutRef:
                  type: object
                  required:
                    - name
                  properties:
                    apiGroup:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                replicas:
                  type: integer
                  format: int32
                  minimum: 0
                serviceAccountName:
                  type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                activeImage:
                  type: string
                targets:
                  type: array
                  items:
                    type: object
                    required:
                      - clusterMemberRef
                      - state
                    properties:
                      clusterMemberRef:
                        type: string
                      state:
                        type: string
                        enum:
                          - Pending
                          - Reconciling
                          - Available
                          - Degraded
                          - Failed
                      runtimeRef:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
