apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: serviceendpoints.routing.polykube.dev
spec:
  group: routing.polykube.dev
  scope: Namespaced
  names:
    plural: serviceendpoints
    singular: serviceendpoint
    kind: ServiceEndpoint
    listKind: ServiceEndpointList
    shortNames:
      - pse
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - workloadRef
              properties:
                workloadRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                hostnames:
                  type: array
                  items:
                    type: string
                routingMode:
                  type: string
                  enum:
                    - ActivePassive
                    - ActiveActive
                primaryMemberRef:
                  type: string
                failoverPolicy:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    healthThreshold:
                      type: string
                gatewayRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    section:
                      type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                activeMemberRef:
                  type: string
                resolvedHostnames:
                  type: array
                  items:
                    type: string
                lastTransitionTime:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
