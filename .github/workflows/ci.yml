name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository-sanity:
    name: Repository sanity
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f README.md
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f docs/architecture.md
          test -f docs/roadmap.md
