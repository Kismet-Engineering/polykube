name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  repository-sanity:
    name: Repository sanity
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum

      - name: Validate repository scaffold
        run: bash scripts/validate-repo.sh

  operator-e2e:
    name: Operator e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: repository-sanity
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum

      - name: Run operator e2e
        run: bash scripts/e2e.sh
        env:
          POLYKUBE_OPERATOR_IMAGE: polykube-operator:e2e
          E2E_TIMEOUT: "300"

  operator-image:
    name: Operator image
    runs-on: ubuntu-latest
    needs: repository-sanity
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kismet-engineering/polykube-operator
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: operator/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
