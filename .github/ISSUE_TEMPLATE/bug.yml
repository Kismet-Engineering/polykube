name: Bug
description: Report broken or surprising behavior
title: ""
labels: ["type:bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed Behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Include commands and relevant environment details.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Artifacts
      description: Do not include secrets or live credentials.
