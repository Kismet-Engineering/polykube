name: Feature
description: Propose or track a product capability
title: ""
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful implementation.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - operator
        - infra
        - gitops
        - examples
        - docs
        - release
        - unknown
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should we prove this works?
